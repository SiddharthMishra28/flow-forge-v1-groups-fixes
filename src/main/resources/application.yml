spring:
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.testautomation.orchestrator: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# GitLab configuration
gitlab:
  base-url: https://gitlab.com
  mock-mode: false  # Set to true for development/testing without real GitLab
  timeout: 60
  max-retries: 3

# Flow Execution Configuration
flow-execution:
  # Pipeline status polling interval during flow execution in milliseconds
  # This controls how frequently the system checks if running pipelines have completed
  # Lower values = more responsive status updates but higher API load
  # OPTIMIZED: Reduced from 15000ms to 5000ms for faster status updates
  # Default: 5000ms (5 seconds)
  polling-interval: ${FLOW_EXECUTION_POLLING_INTERVAL:5000}
  
  # Startup recovery configuration
  # Enables automatic recovery of in-flight pipeline executions on service restart
  # When the service restarts, it checks the database for any pipelines in RUNNING state
  # and automatically resumes polling for them to ensure no status updates are lost
  recovery:
    enabled: ${FLOW_EXECUTION_RECOVERY_ENABLED:true}  # Enable startup recovery (default: true)

# Scheduling Configuration
scheduling:
  token-validation:
    # Cron expression for token validation job (default: every day at 2:00 AM)
    # Format: second minute hour day month weekday
    # 0 0 2 * * * = Every day at 2:00 AM
    cron: ${TOKEN_VALIDATION_CRON:0 0 2 * * *}
  pipeline-status:
    # Scheduled pipeline status polling interval in milliseconds for delayed/scheduled flows
    # OPTIMIZED: Reduced from 60000ms to 30000ms for faster scheduled step resumption
    # Default: 30000ms (30 seconds)
    polling-interval: ${PIPELINE_STATUS_POLLING_INTERVAL:30000}
  queue-processing:
    # Queued flow execution polling interval in milliseconds (default: 30 seconds)
    polling-interval: ${QUEUE_PROCESSING_POLLING_INTERVAL:30000}
    # Initial delay before first queue processing after startup in milliseconds (default: 10 seconds)
    initial-delay: ${QUEUE_PROCESSING_INITIAL_DELAY:10000}
    # Maximum retry attempts for queue processing failures (default: 3)
    max-retry-count: ${QUEUE_PROCESSING_MAX_RETRY:3}

# Thread Pool Configuration
# flowExecutionTaskExecutor: corePool=20, maxPool=70, queueCapacity=5
# - Sized to handle 50-70 concurrent flows without internal queue buffering.
# - The tiny queueCapacity=5 is a burst buffer only; all real overflow goes to
#   queued_flow_executions (DB-backed, restart-safe).
# pipelinePollingTaskExecutor: corePool=5, maxPool=10, queueCapacity=20
# - Used only by SyncService background tasks.
# - Individual pipeline status polling runs on Spring's @Scheduled executor.

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: production
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/pipeline_orchestrator}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate

springdoc:
  swagger-ui:
    enabled: false

logging:
  level:
    com.testautomation.orchestrator: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
